schema: team-workflow

context: |
  Proyecto: Recipe Book (Libro de Recetas)
  Tech stack: React 19 + TypeScript, Vite, RTK Query, Tailwind CSS v4
  Mock API: JSON Server en http://localhost:3001
  Endpoints disponibles: GET /recipes, GET /recipes/:id, POST /recipes, GET /categories
  Arquitectura:
    - src/features/<domain>/ — feature modules por dominio
    - src/shared/components/ — componentes compartidos
    - src/store/store.ts — Redux store con RTK Query
  Patrones:
    - RTK Query para data fetching (createApi con fetchBaseQuery)
    - React Hook Form + Zod para formularios y validación
    - Tailwind CSS v4 para estilos (utility-first)
  Convenciones:
    - Componentes en PascalCase, archivos en PascalCase.tsx
    - Types/interfaces en archivos separados (*.types.ts)
    - Un API slice por feature (con endpoints de query y mutation)

rules:
  proposal:
    - Incluir sección "Impacto en features existentes" si modifica código existente
    - Definir claramente qué está IN scope y OUT of scope
    - El approach debe mencionar qué archivos existentes se modifican
  specs:
    - Usar formato Given/When/Then para todos los escenarios
    - Incluir al menos un escenario de error o edge case por requirement
    - Usar keywords RFC 2119 (MUST, SHALL, SHOULD, MAY) consistentemente
    - Los requirements deben describir comportamiento observable, no implementación
  design:
    - Listar todos los archivos nuevos y modificados con su ruta completa
    - Incluir sección de "Architecture Decisions" con justificación
    - Referenciar patrones existentes del proyecto antes de proponer nuevos
  tasks:
    - Agrupar tasks por área (types, API, components, integration)
    - Cada task debe ser completable en una sola sesión
    - Incluir task de verificación visual al final